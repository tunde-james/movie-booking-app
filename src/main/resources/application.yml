spring:
  application:
    name: moviebookingapp

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/moviebookingapp}
    username: ${DB_USERNAME:moviebooking}
    password: ${DB_PASSWORD:moviebooking}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true